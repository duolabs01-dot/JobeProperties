<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobe Propco — Homepage Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-display: 'Bodoni Moda', serif;
  --font-sans: 'Manrope', sans-serif;
  --font-mono: 'Geist Mono', monospace;
  --white: #ffffff;
  --off-white: #fafaf8;
  --surface: #f4f1ec;
  --surface-strong: #eae6df;
  --accent: #c8673a;
  --accent-light: #f2e4dc;
  --accent-dark: #9e4d26;
  --gold: #c9a84c;
  --ink: #1c1917;
  --ink-soft: #44403c;
  --muted: #78716c;
  --line: rgba(28,25,23,0.1);
  --line-strong: rgba(28,25,23,0.18);
  --stone: #d6d0c8;
}

html { background: var(--off-white); }
body {
  font-family: var(--font-sans);
  background: var(--off-white);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
img { display: block; }
::selection { background: rgba(200,103,58,0.15); }
button { font-family: inherit; }
input::placeholder { color: rgba(255,255,255,0.5); }

@keyframes kenBurns {
  0% { transform: scale(1.05) translate(0, 0); }
  100% { transform: scale(1.12) translate(-1%, -1%); }
}
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.3); opacity: 0.8; }
}
@keyframes waFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes signalPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0; transform: scale(1.5); }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/hero-light.jsx"></script>
<script type="text/babel" src="components/sections-light.jsx"></script>
<script type="text/babel" src="components/sections-b.jsx"></script>

<script type="text/babel">
const App = () => (
  <div>
    <SiteHeader />
    <main>
      <HeroSection />
      <TrustBar />
      <GallerySection />
      <StatsSection />
      <AmenitiesSection />
      <EcosystemStrip />
      <PortalSection />
      <TestimonialsSection />
      <WaitingListCTA />
    </main>
    <SiteFooter />
    <WhatsAppBtn />
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
